spring:
  application:
    name: securetaskflow

  datasource:
    url: jdbc:postgresql://localhost:5433/securetaskflow
    username: postgres
    password: Password123
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate    # NEVER 'create' or 'update' in production
    show-sql: false           # true only in dev — logs all SQL
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 8

server:
  port: 8080
  error:
    include-stacktrace: never   # CRITICAL — never expose stack traces
    include-message: never      # We control error messages via RFC 7807

application:
  jwt:
    secret: hSZYnCto8CwuUCz7zPy2LytYyqSEqj7hRlVS6EYzWRE=
    access-token-expiry-ms: ${JWT_ACCESS_EXPIRY_MS:900000}
    refresh-token-expiry-ms: ${JWT_REFRESH_EXPIRY_MS:604800000}
  security:
    max-login-attempts: 5
    lockout-duration-minutes: ${LOCKOUT_DURATION_MINUTES:15}